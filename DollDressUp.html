<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doll Dress Up</title>
  <style>
    :root {
      --cream: #FFF6E6;
      --sky: #4FA3E0;
      --deep: #2C6FAE;
      --wood: #A9784F;
      --wood-dark: #6D4A30;
      --ink: #3A2E25;
      --white: #FFFFFF;
      --warm: #FFF0D4;
      --leaf: #6FB36F;
      --sun: #FFC94D;
      --coral: #F08C7A;
      --shadow: rgba(58, 46, 37, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, var(--cream) 0%, #FFE9C4 100%);
      color: var(--ink);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-size: 22px;
    }

    button,
    a {
      color: inherit;
      font: inherit;
    }

    .app {
      width: min(1220px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .screen {
      min-height: calc(100vh - 28px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 18px;
      border: 8px solid var(--wood);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 240, 212, 0.96));
      box-shadow: 0 14px 34px var(--shadow);
    }

    .top-bar {
      min-height: 106px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px;
      border: 5px solid var(--sky);
      border-radius: 20px;
      background: var(--white);
      box-shadow: inset 0 -5px 0 rgba(79, 163, 224, 0.14);
    }

    .top-left,
    .top-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-block {
      flex: 1 1 auto;
      min-width: 190px;
      text-align: center;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      color: var(--deep);
      font-size: clamp(2.2rem, 7vw, 4.8rem);
      line-height: 1;
      font-weight: 900;
    }

    h2 {
      color: var(--wood-dark);
      font-size: clamp(1.7rem, 4vw, 3rem);
      line-height: 1.08;
      font-weight: 900;
    }

    .prompt {
      color: var(--deep);
      font-size: clamp(1.25rem, 3vw, 1.9rem);
      font-weight: 800;
    }

    .icon-button,
    .card-button,
    .clothes-button,
    .tab-button,
    .reset-button {
      min-width: 96px;
      min-height: 96px;
      border: 5px solid var(--sky);
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #EAF7FF);
      box-shadow: 0 8px 0 var(--deep), 0 12px 20px var(--shadow);
      cursor: pointer;
      touch-action: manipulation;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .icon-button:active,
    .card-button:active,
    .clothes-button:active,
    .tab-button:active,
    .reset-button:active {
      transform: translateY(5px);
      box-shadow: 0 3px 0 var(--deep), 0 6px 14px var(--shadow);
    }

    .icon-button:focus-visible,
    .card-button:focus-visible,
    .clothes-button:focus-visible,
    .tab-button:focus-visible,
    .reset-button:focus-visible {
      outline: 5px solid rgba(255, 201, 77, 0.8);
      outline-offset: 4px;
    }

    .home-button,
    .back-button,
    .sound-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .home-button {
      width: 138px;
      gap: 8px;
      border-color: var(--wood);
      background: linear-gradient(180deg, #FFF7E7, #FFDCA0);
      color: var(--wood-dark);
      font-size: 1.35rem;
      box-shadow: 0 8px 0 var(--wood-dark), 0 12px 20px var(--shadow);
      text-decoration: none;
    }

    .back-button {
      width: 126px;
      gap: 8px;
      border-color: var(--wood);
      background: linear-gradient(180deg, #FFF7E7, #FFDCA0);
      color: var(--wood-dark);
      font-size: 1.3rem;
      box-shadow: 0 8px 0 var(--wood-dark), 0 12px 20px var(--shadow);
    }

    .sound-button {
      width: 100px;
      font-size: 2.2rem;
    }

    .pick-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(18px, 4vw, 32px);
      align-items: stretch;
    }

    .card-button {
      min-height: 320px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 14px;
      padding: 22px;
      border-color: var(--wood);
      background: linear-gradient(180deg, #FFFFFF, var(--warm));
      color: var(--deep);
      font-weight: 900;
      text-align: center;
      box-shadow: 0 10px 0 var(--wood-dark), 0 16px 28px var(--shadow);
    }

    .card-button:hover,
    .clothes-button:hover,
    .tab-button:hover,
    .reset-button:hover,
    .home-button:hover,
    .back-button:hover,
    .sound-button:hover {
      transform: translateY(-3px);
    }

    .card-preview {
      width: min(100%, 220px);
      height: auto;
      border: 6px solid var(--sky);
      border-radius: 28px;
      background: #FFFDF7;
      box-shadow: inset 0 -8px 0 rgba(79, 163, 224, 0.12);
    }

    .card-name {
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.05;
    }

    .room-layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(280px, 0.85fr) minmax(360px, 1.15fr);
      gap: clamp(16px, 3vw, 28px);
      align-items: stretch;
    }

    .doll-panel,
    .wardrobe-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 18px;
      border: 6px solid var(--wood);
      border-radius: 24px;
      background: linear-gradient(180deg, #FFFFFF, #FFF1D3);
      box-shadow: 0 10px 0 rgba(109, 74, 48, 0.23), 0 16px 26px var(--shadow);
    }

    .doll-stage {
      flex: 1;
      min-height: 420px;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 5px solid var(--sky);
      border-radius: 24px;
      background:
        linear-gradient(180deg, #F7FCFF, #FFFFFF 58%, #FFE8B8 59%),
        var(--white);
      box-shadow: inset 0 -8px 0 rgba(79, 163, 224, 0.12);
    }

    .doll-svg {
      width: min(100%, 370px);
      height: auto;
      max-height: 540px;
      filter: drop-shadow(0 10px 12px rgba(58, 46, 37, 0.18));
    }

    .reset-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 22px;
      border-color: var(--wood);
      background: linear-gradient(180deg, #FFFFFF, #FFE5AF);
      color: var(--wood-dark);
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 900;
      box-shadow: 0 8px 0 var(--wood-dark), 0 12px 20px var(--shadow);
    }

    .tab-list {
      display: grid;
      grid-template-columns: repeat(5, minmax(96px, 1fr));
      gap: 12px;
    }

    .tab-button {
      display: grid;
      place-items: center;
      padding: 10px;
      color: var(--deep);
      font-size: clamp(1.05rem, 2.2vw, 1.45rem);
      font-weight: 900;
      line-height: 1.05;
    }

    .tab-button.is-active {
      border-color: var(--leaf);
      background: linear-gradient(180deg, #FFFFFF, #E2FFE9);
      box-shadow: 0 8px 0 #3E8D55, 0 12px 20px var(--shadow);
      color: var(--ink);
    }

    .wardrobe-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .clothes-button {
      min-height: 136px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 12px;
      padding: 12px;
      text-align: left;
      border-color: var(--sky);
      background: linear-gradient(180deg, #FFFFFF, #F0FBFF);
      font-weight: 900;
    }

    .clothes-button.is-worn {
      border-color: var(--leaf);
      background: linear-gradient(180deg, #FFFFFF, #E5FFED);
      box-shadow: 0 8px 0 #3E8D55, 0 12px 20px var(--shadow);
    }

    .thumb {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border: 4px solid var(--wood);
      border-radius: 20px;
      background: #FFF7E7;
      font-size: 2.45rem;
    }

    .item-text {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .item-label {
      color: var(--deep);
      font-size: clamp(1.2rem, 3vw, 1.65rem);
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .item-slot {
      color: var(--wood-dark);
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .status-line {
      min-height: 46px;
      color: var(--wood-dark);
      font-size: clamp(1.1rem, 2.8vw, 1.55rem);
      font-weight: 900;
      text-align: center;
    }

    @media (max-width: 980px) {
      .room-layout {
        grid-template-columns: 1fr;
      }

      .doll-stage {
        min-height: 360px;
      }

      .tab-list {
        grid-template-columns: repeat(3, minmax(96px, 1fr));
      }
    }

    @media (max-width: 680px) {
      .screen {
        min-height: calc(100vh - 16px);
        padding: 10px;
        border-width: 5px;
        border-radius: 18px;
      }

      .top-bar {
        align-items: stretch;
        flex-direction: column;
      }

      .top-left,
      .top-right {
        justify-content: center;
      }

      .home-button,
      .back-button {
        width: 126px;
      }

      .sound-button {
        width: 96px;
      }

      .pick-grid,
      .wardrobe-grid {
        grid-template-columns: 1fr;
      }

      .tab-list {
        grid-template-columns: repeat(2, minmax(96px, 1fr));
      }

      .clothes-button {
        grid-template-columns: auto 1fr;
      }
    }

    @media (max-width: 420px) {
      .tab-list {
        grid-template-columns: 1fr;
      }

      .home-button,
      .back-button,
      .sound-button {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

      .card-button:hover,
      .clothes-button:hover,
      .tab-button:hover,
      .reset-button:hover,
      .home-button:hover,
      .back-button:hover,
      .sound-button:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>

    const state = {
      screen: "pickDoll",
      doll: null,
      category: "summer",
      worn: emptyWorn(),

    let muted = false;
    let audioCtx = null;
    let statusText = "";
    let lastTapAt = 0;

    function emptyWorn() {
      return { head: null, top: null, bottom: null, feet: null, full: null };
    }

    function skin() {
      return "#D8A06F";
    }

    function lineColor() {
      return "#5A4632";
    }

    function artDefs() {
      return [
        '<defs>',
        '<linearGradient id="clothDepth" x1="0" y1="0" x2="0" y2="1">',
        '<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>',
        '<stop offset="52%" stop-color="#FFFFFF" stop-opacity="0"/>',
        '<stop offset="100%" stop-color="#5A4632" stop-opacity="0.18"/>',
        '</linearGradient>',
        '<linearGradient id="skinDepth" x1="0" y1="0" x2="0" y2="1">',
        '<stop offset="0%" stop-color="#F0BD8C"/>',
        '<stop offset="100%" stop-color="' + skin() + '"/>',
        '</linearGradient>',
        '<filter id="softClothShadow" x="-20%" y="-20%" width="140%" height="150%">',
        '<feDropShadow dx="0" dy="2" stdDeviation="1.6" flood-color="#5A4632" flood-opacity="0.18"/>',

        '<filter id="softDollShadow" x="-20%" y="-20%" width="140%" height="150%">',
        '<feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#5A4632" flood-opacity="0.16"/>',
        '</filter>',
        '</defs>',
      ].join("");
    }

    function stageBackdrop() {

        '<path d="M159 102 H202" stroke="#A9784F" stroke-width="4" stroke-linecap="round"/>',

        '<path d="M170 118 Q178 107 186 118 L190 151 Q178 157 166 151 Z" fill="#F08C7A" opacity="0.3" stroke="#D6A58C" stroke-width="1.5"/>',
        '<path d="M189 118 Q196 109 203 118 L205 150 Q196 156 187 150 Z" fill="#4FA3E0" opacity="0.25" stroke="#9BC7DF" stroke-width="1.5"/>',

        '</g>',
      ].join("");
    }

    function girlBaseSvg() {
      return [
        artDefs(),
        stageBackdrop(),

        '<path d="M127 298 Q144 282 165 290 Q176 302 167 306 Q138 311 127 298 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M127 298 Q144 282 165 290 Q176 302 167 306 Q138 311 127 298 Z" fill="url(#clothDepth)"/>',
        '<path d="M82 296 H104 M136 296 H158" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>',
        '</g>',
      ].join("");
    }

    function bootsSvg(color) {
      return [
        '<g class="wear-feet" filter="url(#softClothShadow)">',
        '<path d="M76 269 H107 Q109 284 113 300 Q97 313 72 306 Q70 287 76 269 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M76 269 H107 Q109 284 113 300 Q97 313 72 306 Q70 287 76 269 Z" fill="url(#clothDepth)"/>',
        '<path d="M133 269 H164 Q170 287 168 306 Q143 313 127 300 Q131 284 133 269 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M133 269 H164 Q170 287 168 306 Q143 313 127 300 Q131 284 133 269 Z" fill="url(#clothDepth)"/>',
        '<path d="M79 278 H105 M135 278 H161" stroke="#FFF6E6" stroke-width="4" stroke-linecap="round"/>',
        '</g>',
      ].join("");
    }

    function slippersSvg(color) {
      return [
        '<g class="wear-feet" filter="url(#softClothShadow)">',
        '<path d="M74 293 Q96 285 112 299 Q100 312 72 306 Q64 302 74 293 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M74 293 Q96 285 112 299 Q100 312 72 306 Q64 302 74 293 Z" fill="url(#clothDepth)"/>',
        '<path d="M128 299 Q144 285 166 293 Q176 302 168 306 Q140 312 128 299 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M128 299 Q144 285 166 293 Q176 302 168 306 Q140 312 128 299 Z" fill="url(#clothDepth)"/>',
        '<circle cx="92" cy="298" r="5.5" fill="#FFF6E6" stroke="' + lineColor() + '" stroke-width="1.5"/><circle cx="148" cy="298" r="5.5" fill="#FFF6E6" stroke="' + lineColor() + '" stroke-width="1.5"/>',
        '</g>',
      ].join("");
    }

    function socksSvg(color) {
      return [
        '<g class="wear-feet" filter="url(#softClothShadow)">',
        '<path d="M79 269 H106 Q109 284 111 298 Q98 309 76 304 Q76 286 79 269 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M79 269 H106 Q109 284 111 298 Q98 309 76 304 Q76 286 79 269 Z" fill="url(#clothDepth)"/>',
        '<path d="M134 269 H161 Q164 286 164 304 Q142 309 129 298 Q131 284 134 269 Z" fill="' + color + '" stroke="' + lineColor() + '" stroke-width="2"/>',
        '<path d="M134 269 H161 Q164 286 164 304 Q142 309 129 298 Q131 284 134 269 Z" fill="url(#clothDepth)"/>',
        '<path d="M81 281 H107 M133 281 H159" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>',
        '</g>',
      ].join("");
    }

    function initAudio() {
      if (!audioCtx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
          audioCtx = new AudioContext();
        }
      }
    }

    function playTone(freq, durationMs, type) {
      if (muted || !audioCtx) return;
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type || "sine";
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.14, now + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + durationMs / 1000);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + durationMs / 1000 + 0.03);
    }

    function sfxTap() {
      playTone(540, 70, "triangle");
      window.setTimeout(function () { playTone(720, 60, "sine"); }, 55);
    }

    function toggleMute() {
      initAudio();
      muted = !muted;
      if (!muted) sfxTap();
      render();
    }

    function goHome() {
      window.location.href = "Dashboard.html";
    }

    function goBack() {
      sfxTap();
      state.screen = "pickDoll";
      state.doll = null;
      state.worn = emptyWorn();
      statusText = "";
      render();
    }

    function pickDoll(id) {
      sfxTap();
      state.doll = id;
      state.category = "summer";
      state.worn = emptyWorn();
      statusText = "Pick clothes for " + DOLLS[id].name + ".";
      state.screen = "room";
      render();
    }

    function setCategory(id) {
      sfxTap();
      state.category = id;
      statusText = "";
      render();
    }

    function wearItem(id) {
      const now = Date.now();
      if (now - lastTapAt < 160) return;
      lastTapAt = now;

      const item = findClothing(id);
      if (!item) return;

      sfxTap();
      if (item.slot === "full") {
        state.worn.full = id;
        state.worn.top = null;
        state.worn.bottom = null;
      } else {
        state.worn[item.slot] = id;
        if (item.slot === "top" || item.slot === "bottom") {
          state.worn.full = null;
        }
      }

      statusText = item.label + " is on!";
      render();
    }

    function resetClothes() {
      sfxTap();
      state.worn = emptyWorn();
      statusText = "All reset.";
      render();
    }

    function findClothing(id) {
      if (!state.doll) return null;
      const categories = CLOTHES[state.doll];
      for (let i = 0; i < CATEGORIES.length; i += 1) {
        const list = categories[CATEGORIES[i].id] || [];
        for (let j = 0; j < list.length; j += 1) {
          if (list[j].id === id) return list[j];
        }
      }
      return null;
    }

    function homeButton() {
      return '<button class="icon-button home-button" type="button" onclick="goHome()" aria-label="Home">🏠 <span>Home</span></button>';
    }

    function backButton() {
      return state.screen === "room"
        ? '<button class="icon-button back-button" type="button" onclick="goBack()" aria-label="Pick doll">← <span>Pick</span></button>'
        : "";
    }

    function soundButton() {
      return '<button class="icon-button sound-button" type="button" onclick="toggleMute()" aria-label="Toggle sound">' + (muted ? "🔇" : "🔈") + '</button>';
    }

    function topBar(title, subtitle) {
      return [
        '<header class="top-bar">',
        '<div class="top-left">',
        homeButton(),
        backButton(),
        '</div>',
        '<div class="title-block">',
        '<h1>' + title + '</h1>',
        subtitle ? '<p class="prompt">' + subtitle + '</p>' : '',
        '</div>',
        '<div class="top-right">',
        soundButton(),
        '</div>',
        '</header>',
      ].join("");
    }

    function renderPickDoll() {
      const cards = Object.keys(DOLLS).map(function (id) {
        const doll = DOLLS[id];
        return [
          '<button class="card-button" type="button" onclick="pickDoll(\'' + id + '\')">',
          renderDollSvg(id, emptyWorn(), 'card-preview', doll.name + ' preview'),
          '<span class="card-name">' + doll.name + '</span>',
          '</button>',
        ].join("");
      }).join("");

      return [
        '<section class="screen">',
        topBar("Doll Dress Up", "Pick a doll"),
        '<div class="pick-grid">',
        cards,
        '</div>',
        '</section>',
      ].join("");
    }

    function renderDollSvg(id, worn, className, label) {
      const doll = DOLLS[id] || DOLLS.girl;
      const layers = ["full", "bottom", "top", "feet", "head"].map(function (slot) {
        return worn[slot] ? (findClothing(worn[slot]) || {}).svg || "" : "";
      }).join("");

      return [
        '<svg class="' + className + '" viewBox="0 0 240 340" role="img" aria-label="' + label + '">',
        doll.baseSvg,
        layers,
        '</svg>',
      ].join("");
    }

    function renderTabs() {
      return CATEGORIES.map(function (category) {
        const active = state.category === category.id ? " is-active" : "";
        return [
          '<button class="tab-button' + active + '" type="button" onclick="setCategory(\'' + category.id + '\')" aria-pressed="' + (state.category === category.id) + '">',
          '<span>' + category.icon + '</span>',
          '<span>' + category.label + '</span>',
          '</button>',
        ].join("");
      }).join("");
    }

    function renderWardrobe() {
      const list = CLOTHES[state.doll][state.category] || [];
      return list.map(function (item) {
        const active = state.worn[item.slot] === item.id || (item.slot === "full" && state.worn.full === item.id);
        return [
          '<button class="clothes-button' + (active ? " is-worn" : "") + '" type="button" onclick="wearItem(\'' + item.id + '\')" aria-pressed="' + active + '">',
          '<span class="thumb" aria-hidden="true">' + item.thumb + '</span>',
          '<span class="item-text">',
          '<span class="item-label">' + item.label + '</span>',
          '<span class="item-slot">' + SLOT_NAMES[item.slot] + '</span>',
          '</span>',
          '</button>',
        ].join("");
      }).join("");
    }

    function renderRoom() {
      const doll = DOLLS[state.doll] || DOLLS.girl;
      const category = CATEGORIES.find(function (item) { return item.id === state.category; }) || CATEGORIES[0];
      return [
        '<section class="screen">',
        topBar("Dressing Room", doll.name),
        '<div class="room-layout">',
        '<section class="doll-panel" aria-label="Doll">',
        '<div class="doll-stage">',
        renderDollSvg(state.doll, state.worn, 'doll-svg', doll.name + ' wearing selected clothes'),
        '</div>',
        '<button class="reset-button" type="button" onclick="resetClothes()">🔄 <span>Reset</span></button>',
        '<div class="status-line" aria-live="polite">' + statusText + '</div>',
        '</section>',
        '<section class="wardrobe-panel" aria-label="Wardrobe">',
        '<h2>' + category.icon + ' ' + category.label + '</h2>',
        '<div class="tab-list" role="tablist" aria-label="Clothing categories">',
        renderTabs(),
        '</div>',
        '<div class="wardrobe-grid">',
        renderWardrobe(),
        '</div>',
        '</section>',
        '</div>',
        '</section>',
      ].join("");
    }

    function render() {
      const app = document.getElementById("app");
      if (state.screen === "room" && state.doll) {
        app.innerHTML = renderRoom();
      } else {
        state.screen = "pickDoll";
        app.innerHTML = renderPickDoll();
      }
    }

    document.addEventListener("pointerdown", initAudio, { once: true });
    render();
  </script>
</body>
</html>
